<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem AR Tumbuhan - Polosan</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; }
        #error-msg { position: absolute; top: 50%; width: 100%; text-align: center; color: red; display: none; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="none" 
        shadow-intensity="1" 
        alt="Model 3D Tumbuhan">
        
        <button slot="ar-button" style="background-color: #4CAF50; border: none; border-radius: 4px; padding: 12px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; font-weight: bold; cursor: pointer;">
            👋 Lihat di Kamera HP (Aktifkan AR)
        </button>
    </model-viewer>

    <div id="error-msg">Model tumbuhan tidak ditemukan di URL.</div>

    <script>
        // Mengambil nama tumbuhan dari parameter URL (?tumbuhan=...)
        const urlParams = new URLSearchParams(window.location.search);
        const namaTumbuhan = urlParams.get('tumbuhan');
        const viewer = document.getElementById('viewer');
        const errorMsg = document.getElementById('error-msg');

        if (namaTumbuhan) {
            // Mengarahkan model-viewer ke folder assets/tumbuhan/nama_tumbuhan.glb
            viewer.src = `assets/tumbuhan/${namaTumbuhan}.glb`;
        } else {
            viewer.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
